spring.application.name=workspace-backend
server.port=8080

# PostgreSQL (Monsora)
spring.datasource.url=jdbc:postgresql://localhost:5432/monsora
spring.datasource.username=monsora
spring.datasource.password=monsora_dev_password

# Redis / Valkey (Monsora)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Flyway
spring.flyway.locations=classpath:db/migration

# JPA / jOOQ
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# JWT(从环境变量注入;默认值仅供开发)
jwt.secret=${JWT_SECRET:dev-only-secret-please-change-me-must-be-at-least-32-chars}
jwt.ttl-millis=86400000

# Hocuspocus → Spring Boot 内部持久化接口
collaboration.internal-token=${COLLABORATION_INTERNAL_TOKEN:dev-only-collaboration-internal-token-change-me}
collaboration.max-document-bytes=${COLLABORATION_MAX_DOCUMENT_BYTES:16777216}

# 空间级文件树事件 WebSocket
workspace.websocket.allowed-origin-patterns=${WORKSPACE_WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

# 默认 dev profile(dev-only 控制器如 /api/dev/login 才生效)
spring.profiles.active=dev

# 对象存储(开发期用本地 MinIO;生产换 endpoint / key 即可)
storage.endpoint=${STORAGE_ENDPOINT:http://localhost:9000}
storage.region=${STORAGE_REGION:us-east-1}
storage.access-key=${STORAGE_ACCESS_KEY:minioadmin}
storage.secret-key=${STORAGE_SECRET_KEY:minioadmin}
storage.bucket=${STORAGE_BUCKET:workspace-uploads}
storage.public-url=${STORAGE_PUBLIC_URL:http://localhost:9000}
