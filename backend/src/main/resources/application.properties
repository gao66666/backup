spring.application.name=workspace-backend
server.port=8080

# PostgreSQL (Monsora)
spring.datasource.url=jdbc:postgresql://localhost:5432/monsora
spring.datasource.username=monsora
spring.datasource.password=monsora_dev_password

# Redis / Valkey (Monsora)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Flyway
spring.flyway.locations=classpath:db/migration

# JPA / jOOQ
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false